# Build the DalanHealth web app (web/) and publish it to GitHub Pages,
# served at the custom domain dalanhealth.mlsons.in (see web/public/CNAME).
#
# One-time repo setup (cannot be done from code):
#   Settings → Pages → Build and deployment → Source: "GitHub Actions".
#
# One-time DNS setup in Hostinger (mlsons.in zone):
#   Type CNAME · Name "dalanhealth" · Target "dalansoft.github.io"
#
# After the first successful deploy, tick "Enforce HTTPS" in Settings → Pages.

name: Deploy web to GitHub Pages

on:
  push:
    branches: [master, main]
    paths:
      - 'web/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

# Permissions the deploy-pages action needs to publish to the environment.
permissions:
  contents: read
  pages: write
  id-token: write

# Serialize deployments; let any in-progress publish finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build (Vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      # Auto-enable Pages (build type: GitHub Actions) so no manual toggle in
      # Settings → Pages is required. Uses the pages: write permission above.
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run build
      # SPA fallback: Pages serves 404.html for unknown paths. Reusing the
      # built index.html lets react-router (history mode) handle deep links
      # like /demo and /login on hard refresh.
      - run: cp dist/index.html dist/404.html
      - uses: actions/upload-pages-artifact@v3
        with:
          # Path is relative to the repo root, not the job working-directory.
          path: web/dist

  deploy:
    name: Deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
