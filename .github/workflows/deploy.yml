# DalanHealth CI/CD — push to master → lint → build → deploy → smoke test.
#
# Pipeline:   Push → Lint → Build → (tests) → Deploy API (Railway)
#             → Deploy Web (Vercel) → Smoke tests → ✅
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   RAILWAY_TOKEN        Railway → Account → Tokens (project token)
#   RAILWAY_SERVICE      Railway service name (e.g. "dalanhealth-api")
#   VERCEL_TOKEN         Vercel → Settings → Tokens
#   VERCEL_ORG_ID        from `vercel link` → .vercel/project.json
#   VERCEL_PROJECT_ID    from `vercel link` → .vercel/project.json
#
# Production never depends on any laptop: GitHub runs this on every push,
# Railway and Vercel host the results 24/7.

name: Deploy

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. Frontend quality gates ─────────────────────────────────────────
  web-ci:
    name: Web · lint + typecheck + build
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: web } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm, cache-dependency-path: web/package-lock.json }
      - run: npm ci
      - run: npm run lint:ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with: { name: web-dist, path: web/dist, retention-days: 3 }

  # ── 2. Backend quality gates ──────────────────────────────────────────
  api-ci:
    name: API · import check + tests
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: backend } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12", cache: pip, cache-dependency-path: backend/requirements.txt }
      - run: pip install -r requirements.txt
      # Boot-time sanity: app imports cleanly (catches syntax/config errors).
      - run: python -c "import main; print('FastAPI app OK:', main.app.title)"
      # End-to-end smoke: boots the app on SQLite and exercises auth, queue,
      # wallet, billing, prescriptions, cashback against the real data layer.
      - run: python -X utf8 smoke_test.py

  # ── 3. Deploy backend to Railway ──────────────────────────────────────
  deploy-api:
    name: Deploy API → Railway
    needs: [web-ci, api-ci]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_SERVICE: ${{ secrets.RAILWAY_SERVICE }}
    steps:
      - uses: actions/checkout@v4
      # Two deploy modes:
      #  - RAILWAY_TOKEN set   → controlled CLI deploy from this pipeline.
      #  - RAILWAY_TOKEN empty → Railway's native GitHub integration already
      #    auto-deploys this push; nothing to do here. (Token creation needs
      #    a verified Railway account, so this keeps CI green without one.)
      - name: Deploy via Railway CLI (or defer to native auto-deploy)
        working-directory: backend
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "RAILWAY_TOKEN not set — Railway's GitHub integration auto-deploys this push. Skipping CLI deploy."
            exit 0
          fi
          npm i -g @railway/cli
          railway up --service "$RAILWAY_SERVICE" --ci

  # ── 4. Deploy frontend to Vercel ──────────────────────────────────────
  deploy-web:
    name: Deploy Web → Vercel
    needs: deploy-api
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: web } }
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      # Same dual-mode as the API: without VERCEL_TOKEN, Vercel's own GitHub
      # integration builds + deploys this push automatically.
      - name: Deploy via Vercel CLI (or defer to native auto-deploy)
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "VERCEL_TOKEN not set — Vercel's GitHub integration auto-deploys this push. Skipping CLI deploy."
            exit 0
          fi
          npm i -g vercel
          vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          vercel build --prod --token="$VERCEL_TOKEN"
          vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"

  # ── 5. Smoke tests against production ─────────────────────────────────
  smoke:
    name: Smoke tests
    needs: deploy-web
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      # Free-domain URLs for now; swap to api.dalanhealth.com / dalanhealth.com
      # when the custom domain is added.
      - name: API /health
        run: |
          for i in 1 2 3 4 5; do
            code=$(curl -s -o /dev/null -w "%{http_code}" https://dalanhealth.up.railway.app/health || true)
            [ "$code" = "200" ] && echo "API healthy ✅" && exit 0
            echo "attempt $i → $code, retrying in 15s…" && sleep 15
          done
          echo "API health check failed ❌" && exit 1
      - name: API /health/database
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" https://dalanhealth.up.railway.app/health/database || true)
          [ "$code" = "200" ] && echo "Database healthy ✅" || { echo "Database check returned $code ❌"; exit 1; }
      - name: Frontend reachable
        run: |
          for i in 1 2 3; do
            code=$(curl -s -o /dev/null -w "%{http_code}" -L https://dalanhealth.vercel.app || true)
            [ "$code" = "200" ] && echo "Web healthy ✅" && exit 0
            echo "attempt $i → $code, retrying in 20s…" && sleep 20
          done
          echo "Web health check failed ❌" && exit 1
      - name: Success
        run: echo "🚀 DalanHealth deployed — laptop can sleep."
