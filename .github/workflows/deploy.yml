# DalanHealth CI/CD — push to master → lint → build → deploy → smoke test.
#
# Pipeline:   Push → Lint → Build → (tests) → Deploy API (Railway)
#             → Deploy Web (Vercel) → Smoke tests → ✅
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   RAILWAY_TOKEN        Railway → Account → Tokens (project token)
#   RAILWAY_SERVICE      Railway service name (e.g. "dalanhealth-api")
#   VERCEL_TOKEN         Vercel → Settings → Tokens
#   VERCEL_ORG_ID        from `vercel link` → .vercel/project.json
#   VERCEL_PROJECT_ID    from `vercel link` → .vercel/project.json
#
# Production never depends on any laptop: GitHub runs this on every push,
# Railway and Vercel host the results 24/7.

name: Deploy

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. Frontend quality gates ─────────────────────────────────────────
  web-ci:
    name: Web · lint + typecheck + build
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: web } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm, cache-dependency-path: web/package-lock.json }
      - run: npm ci
      - run: npm run lint:ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with: { name: web-dist, path: web/dist, retention-days: 3 }

  # ── 2. Backend quality gates ──────────────────────────────────────────
  api-ci:
    name: API · import check + tests
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: backend } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12", cache: pip, cache-dependency-path: backend/requirements.txt }
      - run: pip install -r requirements.txt
      # Boot-time sanity: app imports cleanly (catches syntax/config errors).
      - run: python -c "import main; print('FastAPI app OK:', main.app.title)"
      # Unit tests — runs if a tests/ folder exists, succeeds otherwise.
      - run: |
          if [ -d tests ]; then pip install pytest && pytest -q; else echo "No tests yet — skipping"; fi

  # ── 3. Deploy backend to Railway ──────────────────────────────────────
  deploy-api:
    name: Deploy API → Railway
    needs: [web-ci, api-ci]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npm i -g @railway/cli
      - run: railway up --service "$RAILWAY_SERVICE" --ci
        working-directory: backend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_SERVICE: ${{ secrets.RAILWAY_SERVICE }}

  # ── 4. Deploy frontend to Vercel ──────────────────────────────────────
  deploy-web:
    name: Deploy Web → Vercel
    needs: deploy-api
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: web } }
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: npm i -g vercel
      - run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
      - run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
      - run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

  # ── 5. Smoke tests against production ─────────────────────────────────
  smoke:
    name: Smoke tests
    needs: deploy-web
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: API /health
        run: |
          for i in 1 2 3 4 5; do
            code=$(curl -s -o /dev/null -w "%{http_code}" https://api.dalanhealth.com/health || true)
            [ "$code" = "200" ] && echo "API healthy ✅" && exit 0
            echo "attempt $i → $code, retrying in 15s…" && sleep 15
          done
          echo "API health check failed ❌" && exit 1
      - name: Frontend reachable
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" -L https://dalanhealth.com || true)
          [ "$code" = "200" ] && echo "Web healthy ✅" || { echo "Web returned $code ❌"; exit 1; }
      - name: Success
        run: echo "🚀 DalanHealth deployed — laptop can sleep."
