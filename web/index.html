    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <script>
      (function () {
        try {
          // Dark-mode-first: dark unless the visitor explicitly chose light
          // via the theme toggle (stored preference always wins).
          // One-time reset: themes stored before the dark-first switch came
          // from the old OS-preference default, so they don't count as an
          // explicit choice — clear them once so everyone starts dark.
          var stored = localStorage.getItem('dh-theme');
          if (!localStorage.getItem('dh-dark-default-v1')) {
            localStorage.setItem('dh-dark-default-v1', '1');
            localStorage.removeItem('dh-theme');
            stored = null;
          }
          var theme = stored || 'dark';
          if (theme === 'dark') document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>
