<html lang="en" class="">

    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#020617" />

    <!-- Primary SEO -->
    <title>Dalan Health — Smart Queue & Digital OPD Platform | ₹9 Per Patient</title>
    <meta name="description" content="Eliminate waiting lines and modernize your clinic with Dalan Health — smart queue management, QR token booking, digital OPD, live TV queue display and patient tracking. ₹9 + GST per completed patient. No setup fee, no monthly subscription." />
    <meta name="keywords" content="clinic management software India, queue management software, digital OPD system, doctor queue app, hospital queue system, QR token booking, clinic queue display" />
    <meta name="author" content="Dalansoft Technologies Pvt Ltd" />
    <link rel="canonical" href="https://dalanhealth.com/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://dalanhealth.com/" />
    <meta property="og:site_name" content="Dalan Health" />
    <meta property="og:title" content="Dalan Health — Smart Queue & Digital OPD Platform" />
    <meta property="og:description" content="Reduce waiting time. Improve patient experience. Modernize clinics. ₹9 + GST per completed patient — no setup fee, no monthly subscription, no annual contract." />
    <meta property="og:image" content="https://dalanhealth.com/logo-full.png" />
    <meta property="og:locale" content="en_IN" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Dalan Health — Smart Queue & Digital OPD Platform" />
    <meta name="twitter:description" content="Smart queue management for clinics, doctors and hospitals. ₹9 + GST per completed patient." />
    <meta name="twitter:image" content="https://dalanhealth.com/logo-full.png" />

    <!-- Structured data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "name": "Dalan Health",
          "url": "https://dalanhealth.com",
          "logo": "https://dalanhealth.com/logo.png",
          "slogan": "Better Health",
          "email": "info@dalanhealth.com",
          "parentOrganization": { "@type": "Organization", "name": "Dalansoft Technologies Pvt Ltd" },
          "areaServed": { "@type": "Country", "name": "India" }
        },
        {
          "@type": "SoftwareApplication",
          "name": "Dalan Health — Smart Queue & Digital OPD Platform",
          "applicationCategory": "BusinessApplication",
          "operatingSystem": "Web, Android, iOS",
          "description": "Smart queue management, QR token booking, digital OPD, live TV queue display and real-time patient tracking for clinics and hospitals.",
          "offers": {
            "@type": "Offer",
            "price": "9",
            "priceCurrency": "INR",
            "description": "₹9 + GST per completed patient. No setup fee, no monthly subscription, no annual contract."
          }
        }
      ]
    }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('dh-theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var theme = stored || (prefersDark ? 'dark' : 'light');
          if (theme === 'dark') document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
